<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Arch</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, system-ui, sans-serif;
        background:
          radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,0.11), transparent 56%),
          linear-gradient(180deg, #050506 0%, #0B0B0D 100%);
        color: rgba(255,255,255,0.92);
      }
      .panel {
        width: min(100%, 430px);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 8px;
      }
      .code {
        font-size: 56px;
        line-height: 1;
        letter-spacing: 0.08em;
        font-weight: 800;
        color: rgba(255,255,255,0.28);
      }
      .title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .copy {
        font-size: 13px;
        color: rgba(255,255,255,0.64);
        max-width: 300px;
      }
      img {
        width: min(84vw, 320px);
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 18px;
        margin: 8px 0 6px;
        box-shadow: 0 18px 36px rgba(0,0,0,0.5);
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.26);
        padding: 9px 16px;
        background: rgba(255,255,255,0.08);
        color: #FFFFFF;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.01em;
        text-decoration: none;
      }
      a:active { opacity: 0.76; }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="code">404</div>
      <h1 class="title">Page not found</h1>
      <p class="copy">The page you are trying to open does not exist.</p>
      <img src="/404-sad.jpg" alt="Sad 404 illustration" />
      <a href="/">Go to Arch home</a>
    </main>
  </body>
</html>
